services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "443:443"
      - "8443:8443"
      - "9090:9090"
    environment:
      RUST_LOG: info
      TOWONEL_IDENTITY_KEY_PATH: /var/lib/towonel/node.key
      TOWONEL_HUB_DB_DSN: /var/lib/towonel/hub.db
      TOWONEL_HUB_LISTEN_ADDR: 0.0.0.0:8443
      # TOWONEL_HUB_PUBLIC_URL: https://hub.example.eu:8443
      # TOWONEL_HUB_DNS_WEBHOOK_URL: https://dns-sidecar.internal/update
      TOWONEL_EDGE_LISTEN_ADDR: 0.0.0.0:443
      TOWONEL_EDGE_HEALTH_LISTEN_ADDR: 0.0.0.0:9090
    volumes:
      - node-data:/var/lib/towonel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--max-time", "2", "-fsS", "http://localhost:8443/v1/health"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      RUST_LOG: info
    volumes:
      - agent-data:/root/.towonel
    restart: unless-stopped
volumes:
  node-data:
  agent-data:
