services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "443:443"
      - "8443:8443"
      - "9090:9090"
    environment:
      RUST_LOG: info
      TURBO_IDENTITY__KEY_PATH: /var/lib/turbo-tunnel/node.key
      TURBO_HUB__DB_PATH: /var/lib/turbo-tunnel/hub.db
      TURBO_HUB__LISTEN_ADDR: 0.0.0.0:8443
      # TURBO_HUB__PUBLIC_URL: https://hub.example.eu:8443
      # TURBO_HUB__DNS_WEBHOOK_URL: https://dns-sidecar.internal/update
      TURBO_EDGE__LISTEN_ADDR: 0.0.0.0:443
      TURBO_EDGE__HEALTH_LISTEN_ADDR: 0.0.0.0:9090
    volumes:
      - node-data:/var/lib/turbo-tunnel
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      RUST_LOG: info
    volumes:
      - agent-data:/root/.turbo-tunnel
    restart: unless-stopped

volumes:
  node-data:
  agent-data:
