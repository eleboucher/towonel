---
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: "2.12.0"
        run: |
          set -euo pipefail
          wget -qO- \
            "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp
          install -m 0755 "/tmp/git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff

      - name: Generate release notes
        id: changelog
        run: |
          set -euo pipefail
          CONTENT="$(git-cliff --config cliff.toml --latest --strip all)"
          printf 'content<<EOF\n%s\nEOF\n' "$CONTENT" >> "$GITHUB_OUTPUT"

      - name: Create Forgejo release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ steps.changelog.outputs.content }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          jq -n \
            --arg tag "$TAG" \
            --arg name "$TAG" \
            --arg body "$RELEASE_BODY" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}' \
            | curl -fsSL -X POST \
                -H "Authorization: token ${GITEA_TOKEN}" \
                -H "Content-Type: application/json" \
                --data-binary @- \
                "https://git.erwanleboucher.dev/api/v1/repos/${GITHUB_REPOSITORY}/releases"

  container:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6

      - uses: https://data.forgejo.org/docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: https://data.forgejo.org/docker/setup-buildx-action@v4

      - name: Login to git.erwanleboucher.dev
        uses: https://data.forgejo.org/docker/login-action@v4
        with:
          registry: git.erwanleboucher.dev
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.OWNER_PACKAGE_SECRET }}

      - name: Login to registry.erwanleboucher.dev
        uses: https://data.forgejo.org/docker/login-action@v4
        with:
          registry: registry.erwanleboucher.dev
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.APOCI_REGISTRY_TOKEN }}

      - name: Compute node image metadata
        id: meta-node
        uses: https://data.forgejo.org/docker/metadata-action@v6
        with:
          images: |
            git.erwanleboucher.dev/${{ vars.USERNAME }}/towonel-node
            registry.erwanleboucher.dev/${{ vars.USERNAME }}/towonel-node
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push towonel-node
        uses: https://data.forgejo.org/docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.node
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-node.outputs.tags }}
          labels: ${{ steps.meta-node.outputs.labels }}
          cache-from: type=gha,scope=towonel-node
          cache-to: type=gha,scope=towonel-node,mode=max
          build-args: |
            ENABLE_SCCACHE=1
          secrets: |
            SCCACHE_AWS_ACCESS_KEY_ID=${{ secrets.SCCACHE_AWS_ACCESS_KEY_ID }}
            SCCACHE_AWS_SECRET_ACCESS_KEY=${{ secrets.SCCACHE_AWS_SECRET_ACCESS_KEY }}

      - name: Compute agent image metadata
        id: meta-agent
        uses: https://data.forgejo.org/docker/metadata-action@v6
        with:
          images: |
            git.erwanleboucher.dev/${{ vars.USERNAME }}/towonel-agent
            registry.erwanleboucher.dev/${{ vars.USERNAME }}/towonel-agent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push towonel-agent
        uses: https://data.forgejo.org/docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha,scope=towonel-agent
          cache-to: type=gha,scope=towonel-agent,mode=max
          build-args: |
            ENABLE_SCCACHE=1
          secrets: |
            SCCACHE_AWS_ACCESS_KEY_ID=${{ secrets.SCCACHE_AWS_ACCESS_KEY_ID }}
            SCCACHE_AWS_SECRET_ACCESS_KEY=${{ secrets.SCCACHE_AWS_SECRET_ACCESS_KEY }}
