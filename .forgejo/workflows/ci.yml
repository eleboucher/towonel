---
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: docker
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_BUCKET: sccache
      SCCACHE_ENDPOINT: https://s3.erwanleboucher.dev
      SCCACHE_REGION: us-east-1
      SCCACHE_S3_USE_SSL: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: sccache
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: docker
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_BUCKET: sccache
      SCCACHE_ENDPOINT: https://s3.erwanleboucher.dev
      SCCACHE_REGION: us-east-1
      SCCACHE_S3_USE_SSL: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-nextest,sccache
      - run: cargo nextest run --workspace --all-features --no-fail-fast

  deny:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --all-features check

  machete:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo-machete

  typos:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: typos-cli
      - run: typos

  taplo:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - run: taplo fmt --check
