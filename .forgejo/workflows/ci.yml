---
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          components: clippy
      # v2.9.1 — pinned by commit SHA because forgejo-runner rejects annotated tags as ambiguous refs.
      - uses: https://github.com/Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      # v2.9.1 — pinned by commit SHA because forgejo-runner rejects annotated tags as ambiguous refs.
      - uses: https://github.com/Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: test
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --all-features --no-fail-fast

  doc:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      # v2.9.1 — pinned by commit SHA because forgejo-runner rejects annotated tags as ambiguous refs.
      - uses: https://github.com/Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: doc
      - run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  deny:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo-deny --all-features check

  machete:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo-machete

  typos:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: typos-cli
      - run: typos

  taplo:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - run: taplo fmt --check
